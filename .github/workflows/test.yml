name: test

# Runs on every PR targeting main and on direct pushes to main.
# Catches broken tests + type errors at PR-time so they can't slip
# through the way PR #5's broken assertions did (CodeRabbit / Codex
# review the diff, but neither runs vitest).

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# If a new commit is pushed to the same PR, cancel the in-flight run.
# Saves CI minutes and gives the latest commit's status, not a stale one.
concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        # Pinned to match `packageManager` in package.json so CI, the
        # developer's machine, and the package-manifest declaration
        # all agree. Bump all three together when adopting a new Bun.
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      # --ignore-scripts skips esbuild's postinstall version-validator,
      # which is fragile across Node versions.
      # We deliberately don't use --frozen-lockfile so CI can refresh
      # the lockfile if Lovable writes a newer format than the pinned
      # bun version reads. Determinism comes from the lockfile commit
      # itself, not from refusing to install.
      - name: Install dependencies
        run: bun install --ignore-scripts

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

  deno-test:
    name: Deno edge-function tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run broker tests
        # --allow-env: Deno.env reads in the test setup path
        # --no-check:  skip full type-check (tsc handles that in the bun job)
        run: |
          deno test --allow-env --no-check \
            supabase/functions/_shared/broker.test.ts
